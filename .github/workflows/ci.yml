name: Repository Validation CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Validate repository structure
      run: |
        [ -f README.md ] || (echo "README.md missing" && exit 1)
        [ -f LICENSE ] || (echo "LICENSE missing" && exit 1)
        [ -f CONTRIBUTING.md ] || (echo "CONTRIBUTING.md missing" && exit 1)
        echo "Repository structure is valid."

    - name: Check for broken links in Markdown files
      run: |
        # Simple check for broken internal links
        grep -r "\[.*\](.*\.md)" . || echo "No internal links found."
